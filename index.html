<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Learning HQ — La escuela de Claude</title>
<meta name="description" content="La academia central de Claude: prompts, skills, comandos, agentes de WhatsApp e Instagram, rutas de aprendizaje y novedades que se actualizan solas.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect width='48' height='48' rx='12' fill='%23C15F3C'/><g stroke='%23FBF3EA' stroke-width='3.4' stroke-linecap='round'><line x1='24' y1='12' x2='24' y2='36'/><line x1='12' y1='24' x2='36' y2='24'/><line x1='15.5' y1='15.5' x2='32.5' y2='32.5'/><line x1='32.5' y1='15.5' x2='15.5' y2='32.5'/></g></svg>">
<style>
:root{
  --paper:#F6F2EB; --paper2:#EFE8DC; --card:#FFFFFF; --card2:#FBF7F0;
  --ink:#1E1A15; --ink2:#5B5246; --ink3:#90856F;
  --line:#E8DFCF; --line2:#F1EADD;
  --clay:#C15F3C; --clay2:#A8492A; --clay-t:rgba(193,95,60,.10);
  --pine:#1F6F6B; --pine-t:rgba(31,111,107,.10);
  --gold:#B07A12; --gold-t:rgba(176,122,18,.13);
  --berry:#9A3F63; --berry-t:rgba(154,63,99,.10);
  --slate:#4E6285; --slate-t:rgba(78,98,133,.12);
  --code:#221D17; --code-tx:#ECE2D2; --code-dim:#9C8F7C;
  --ok:#2C7A52; --warn:#B26B12;
  --shadow:0 1px 2px rgba(40,30,18,.05),0 14px 40px -22px rgba(40,30,18,.30);
  --shadow-sm:0 1px 2px rgba(40,30,18,.05),0 6px 18px -12px rgba(40,30,18,.20);
  --r:18px; --r2:13px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.serif{font-family:'Fraunces',Georgia,serif}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace}
h1,h2,h3,h4,.display{font-family:'Fraunces',Georgia,serif;letter-spacing:-.01em;line-height:1.07;font-weight:600}
a{color:var(--clay2);text-decoration:none}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2.5px solid var(--clay);outline-offset:2px;border-radius:6px}
::selection{background:var(--clay);color:#fff}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

/* ===== layout ===== */
.app{display:grid;grid-template-columns:264px 1fr;min-height:100vh}
.rail{background:linear-gradient(180deg,#FFFDFA,#FBF6EE);border-right:1px solid var(--line);padding:24px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.rail::-webkit-scrollbar{width:7px}.rail::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 20px}
.brand .lk{display:flex;align-items:center;gap:11px}
.logo-mark{width:42px;height:42px;flex-shrink:0}
.brand .nm{font-family:'Fraunces',serif;font-weight:600;font-size:1.12rem;color:var(--ink);line-height:1.05}
.brand .nm b{color:var(--clay)}
.brand .sub{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--ink3);letter-spacing:.18em;text-transform:uppercase;margin-top:3px}
.navsec{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);padding:14px 12px 5px;font-weight:500}
.navbtn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;color:var(--ink2);font-family:'JetBrains Mono',monospace;font-size:.83rem;padding:9px 12px;border-radius:10px;transition:background .14s,color .14s;position:relative}
.navbtn .ic{width:17px;height:17px;flex-shrink:0;color:var(--ink3);transition:color .14s}
.navbtn:hover{background:var(--card2);color:var(--ink)}
.navbtn:hover .ic{color:var(--clay)}
.navbtn.active{background:var(--clay);color:#fff}
.navbtn.active .ic{color:#fff}
.navbtn .dot{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--clay);box-shadow:0 0 0 4px var(--clay-t)}
.navbtn.active .dot{background:#fff;box-shadow:0 0 0 4px rgba(255,255,255,.25)}
.rail .spacer{flex:1;min-height:14px}
.rail .foot{font-size:.66rem;color:var(--ink3);padding:12px 12px 4px;line-height:1.7;border-top:1px solid var(--line);margin-top:8px}
.rail .foot b{color:var(--ink2)}

main{padding:46px clamp(20px,4.6vw,72px) 110px;max-width:1180px;width:100%}
section{display:none}
section.visible{display:block;animation:fade .34s cubic-bezier(.2,.7,.3,1)}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.topbar,.topnav{display:none}
@media(max-width:900px){
  .app{grid-template-columns:1fr}.rail{display:none}
  .topbar{display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:60;background:rgba(246,242,235,.92);backdrop-filter:blur(12px);padding:11px 14px;border-bottom:1px solid var(--line)}
  .topbar .logo-mark{width:30px;height:30px}
  .topbar .nm{font-family:'Fraunces',serif;font-weight:600;font-size:.98rem}
  .topbar .nm b{color:var(--clay)}
  .topnav{display:flex;gap:6px;overflow-x:auto;position:sticky;top:53px;z-index:55;background:rgba(246,242,235,.92);backdrop-filter:blur(12px);padding:9px 12px;border-bottom:1px solid var(--line);-webkit-overflow-scrolling:touch}
  .topnav::-webkit-scrollbar{display:none}
  .topnav .navbtn{width:auto;white-space:nowrap;font-size:.76rem;padding:7px 11px}
  .topnav .navbtn .ic,.topnav .navbtn .dot{display:none}
  main{padding:24px 15px 90px}
}

/* ===== type & primitives ===== */
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--clay);margin-bottom:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.eyebrow::before{content:"";width:22px;height:1.5px;background:var(--clay);display:inline-block}
.pagetitle{font-size:clamp(2rem,4.4vw,3rem);font-weight:600;margin-bottom:12px;letter-spacing:-.02em}
.lede{color:var(--ink2);max-width:66ch;margin-bottom:34px;font-size:1.06rem}
.lede.tight{margin-bottom:22px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:24px;box-shadow:var(--shadow-sm)}
.card.flat{box-shadow:none;background:var(--card2)}
.grid{display:grid;gap:16px}
.grid.c2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
.grid.c3{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}
.hr{border:none;border-top:1px solid var(--line);margin:34px 0}
.sectit{font-size:1.4rem;font-weight:600;margin:38px 0 6px;display:flex;align-items:center;gap:10px}
.sectit .n{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--clay);background:var(--clay-t);width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-weight:600}
.secsub{color:var(--ink2);margin:0 0 18px;max-width:64ch}

.tag{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:.64rem;letter-spacing:.04em;padding:4px 10px;border-radius:99px;font-weight:500;background:var(--card2);color:var(--ink2);border:1px solid var(--line)}
.tag.clay{color:var(--clay2);background:var(--clay-t);border-color:transparent}
.tag.pine{color:var(--pine);background:var(--pine-t);border-color:transparent}
.tag.slate{color:var(--slate);background:var(--slate-t);border-color:transparent}
.tag.berry{color:var(--berry);background:var(--berry-t);border-color:transparent}
.tag.gold{color:var(--gold);background:var(--gold-t);border-color:transparent}
.tag.new{color:#fff;background:var(--clay);border-color:transparent}

.btn{display:inline-flex;align-items:center;gap:7px;background:var(--clay);color:#fff;border:none;border-radius:11px;padding:11px 18px;font-weight:600;font-size:.9rem;box-shadow:var(--shadow-sm);transition:filter .15s,transform .08s}
.btn:hover{filter:brightness(1.06)}.btn:active{transform:translateY(1px)}
.btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.ghost:hover{border-color:var(--clay);background:var(--card2);filter:none}
.btn.small{padding:8px 14px;font-size:.82rem;border-radius:9px}
.btn.dark{background:var(--code);color:var(--code-tx)}
code.inline{font-family:'JetBrains Mono',monospace;background:var(--card2);border:1px solid var(--line);padding:1px 7px;border-radius:6px;font-size:.83em;color:var(--clay2);white-space:nowrap}

.checklist{list-style:none;display:flex;flex-direction:column;gap:10px}
.checklist li{position:relative;padding-left:24px;color:var(--ink2);font-size:.94rem;line-height:1.55}
.checklist li::before{content:"";position:absolute;left:2px;top:8px;width:8px;height:8px;border-radius:50%;border:2px solid var(--clay)}
.checklist li b{color:var(--ink)}

/* ===== code/copy ===== */
.codeline{display:flex;align-items:center;gap:8px;background:var(--code);border-radius:10px;padding:9px 9px 9px 14px;margin-bottom:7px}
.codeline code{flex:1;font-family:'JetBrains Mono',monospace;font-size:.79rem;color:var(--code-tx);white-space:pre-wrap;word-break:break-word}
.copybtn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:#B7A98F;width:31px;height:31px;border-radius:8px;display:grid;place-items:center;flex-shrink:0;transition:.15s}
.copybtn:hover{background:rgba(255,255,255,.16);color:#fff}
.copybtn svg{width:15px;height:15px}
.copybtn.light{background:var(--card2);border-color:var(--line);color:var(--ink3)}
.copybtn.light:hover{background:#fff;color:var(--clay)}
.linkrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.linkbtn{display:inline-flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--line);color:var(--clay2);font-size:.78rem;font-weight:500;padding:7px 13px;border-radius:9px;cursor:pointer;font-family:inherit;transition:.15s}
.linkbtn:hover{border-color:var(--clay);background:#fff}
.promptbox{background:var(--card2);border:1px solid var(--line);border-radius:13px;padding:16px 17px;margin-top:10px}
.promptbox .lbl{font-size:.66rem;font-family:'JetBrains Mono',monospace;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.promptbox pre{font-family:'JetBrains Mono',monospace;font-size:.79rem;color:var(--ink);white-space:pre-wrap;word-break:break-word;line-height:1.65;margin-bottom:11px;max-height:300px;overflow:auto}

/* ===== hero ===== */
.hero{position:relative;background:linear-gradient(135deg,#FFFCF7 0%,#FBF4EA 100%);border:1px solid var(--line);border-radius:26px;padding:clamp(28px,4vw,52px);overflow:hidden;margin-bottom:24px}
.hero::after{content:"";position:absolute;right:-90px;top:-90px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,var(--clay-t),transparent 68%);pointer-events:none}
.hero .badge{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:99px;padding:6px 14px 6px 8px;font-size:.78rem;color:var(--ink2);margin-bottom:22px;box-shadow:var(--shadow-sm)}
.hero .badge .pulse{width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 rgba(44,122,82,.5);animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(44,122,82,.45)}70%{box-shadow:0 0 0 9px rgba(44,122,82,0)}100%{box-shadow:0 0 0 0 rgba(44,122,82,0)}}
.hero h1{font-size:clamp(2.3rem,5.4vw,3.7rem);font-weight:600;letter-spacing:-.025em;max-width:18ch;margin-bottom:16px}
.hero h1 em{font-style:italic;color:var(--clay)}
.hero p{color:var(--ink2);max-width:60ch;font-size:1.08rem;margin-bottom:26px}
.hero .cta{display:flex;gap:11px;flex-wrap:wrap}

/* stat tiles */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:17px 18px;box-shadow:var(--shadow-sm)}
.stat .n{font-family:'Fraunces',serif;font-size:1.9rem;font-weight:600;color:var(--clay);line-height:1}
.stat .l{font-size:.78rem;color:var(--ink3);margin-top:6px;font-family:'JetBrains Mono',monospace;letter-spacing:.03em}
.stat.dark{background:var(--code)}.stat.dark .n{color:#fff}.stat.dark .l{color:var(--code-dim)}

/* progress ring */
.ringwrap{display:flex;align-items:center;gap:26px;flex-wrap:wrap}
.ring{position:relative;width:128px;height:128px;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-family:'Fraunces',serif;font-size:1.9rem;font-weight:600;color:var(--ink)}
.ring .pct small{font-size:.95rem;color:var(--ink3)}

/* feature/quick cards */
.qgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:19px;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .14s,box-shadow .14s,border-color .14s;text-align:left;display:flex;flex-direction:column;gap:9px}
.qcard:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--clay)}
.qcard .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--clay-t);color:var(--clay)}
.qcard .ic svg{width:20px;height:20px}
.qcard.pine .ic{background:var(--pine-t);color:var(--pine)}
.qcard.berry .ic{background:var(--berry-t);color:var(--berry)}
.qcard.slate .ic{background:var(--slate-t);color:var(--slate)}
.qcard.gold .ic{background:var(--gold-t);color:var(--gold)}
.qcard h3{font-size:1.05rem;font-weight:600}
.qcard p{font-size:.86rem;color:var(--ink2);line-height:1.5}
.qcard .arw{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--clay);margin-top:auto}

/* ===== novedades ===== */
.syncbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;background:var(--code);color:var(--code-tx);border-radius:var(--r2);padding:15px 19px;margin-bottom:22px}
.syncbar .l{display:flex;align-items:center;gap:11px;font-size:.85rem}
.syncbar .l .dot{width:9px;height:9px;border-radius:50%;background:#5BD08A;box-shadow:0 0 10px #5BD08A}
.syncbar .l b{color:#fff}
.syncbar .meta{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--code-dim)}
.timeline{position:relative;padding-left:26px}
.timeline::before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tlitem{position:relative;margin-bottom:16px}
.tlitem::before{content:"";position:absolute;left:-26px;top:22px;width:13px;height:13px;border-radius:50%;background:var(--card);border:2.5px solid var(--clay)}
.tlitem.fresh::before{background:var(--clay);box-shadow:0 0 0 4px var(--clay-t)}
.nov{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:17px 19px;box-shadow:var(--shadow-sm)}
.nov .top{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:8px}
.nov .date{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--ink3);margin-left:auto}
.nov h3{font-size:1.08rem;font-weight:600;margin-bottom:5px}
.nov p{font-size:.9rem;color:var(--ink2);line-height:1.55}
.nov .why{font-size:.84rem;color:var(--ink2);margin-top:8px;padding:9px 12px;background:var(--clay-t);border-radius:9px}
.nov .why b{color:var(--clay2)}
.nov.has-more{cursor:pointer;transition:border-color .14s,box-shadow .14s,transform .12s}
.nov.has-more:hover{border-color:var(--clay);box-shadow:var(--shadow)}
.nov.has-more:active{transform:scale(.997)}
.nov-cta{display:inline-flex;align-items:center;gap:7px;margin-top:13px;font-family:'JetBrains Mono',monospace;font-size:.73rem;color:var(--clay);font-weight:600;letter-spacing:.02em}
.nov-cta .chev{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:6px;background:var(--clay-t);transition:transform .22s}
.nov.open .nov-cta .chev{transform:rotate(90deg)}
.nov.open .nov-cta .lbl-c{display:none}
.nov-cta .lbl-o{display:none}
.nov.open .nov-cta .lbl-o{display:inline}
.nov-more{display:none;margin-top:15px;padding-top:16px;border-top:1px dashed var(--line);cursor:default}
.nov.open .nov-more{display:block;animation:fade .26s}
.nov-more h4{font-family:'JetBrains Mono',monospace;font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin:0 0 9px;font-weight:600}
.nov-more h4.howlbl{margin-top:15px}
.nov-more p{font-size:.92rem;color:var(--ink2);line-height:1.62;margin:0}

/* ===== prompts ===== */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.search{flex:1;min-width:200px;display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:0 14px;box-shadow:var(--shadow-sm)}
.search svg{width:17px;height:17px;color:var(--ink3);flex-shrink:0}
.search input{flex:1;border:none;background:none;padding:12px 0;font-family:inherit;font-size:.92rem;color:var(--ink);outline:none}
.filterrow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px}
.chip{font-family:'JetBrains Mono',monospace;font-size:.76rem;padding:7px 13px;border-radius:99px;border:1px solid var(--line);background:var(--card);color:var(--ink2);transition:.14s}
.chip:hover{border-color:var(--clay);color:var(--clay)}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:19px 20px;box-shadow:var(--shadow-sm);transition:border-color .14s}
.pcard:hover{border-color:var(--line)}
.pcard .head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
.pcard h3{font-size:1.08rem;font-weight:600;margin:8px 0 5px}
.pcard .desc{font-size:.88rem;color:var(--ink2);line-height:1.5}
.pcard .acts{display:flex;gap:7px;flex-shrink:0}
.pcard pre{display:none;margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--ink);white-space:pre-wrap;word-break:break-word;line-height:1.65;background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:15px;max-height:380px;overflow:auto}
.pcard.open pre{display:block}
.pcard.user{border-left:3px solid var(--pine)}

/* ===== slash command ===== */
.cmd{border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;margin-bottom:11px;background:var(--card);box-shadow:var(--shadow-sm)}
.cmd .ch{display:flex;align-items:center;gap:10px;padding:14px 17px;flex-wrap:wrap}
.cmd .name{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:.94rem;color:var(--ink)}
.cmd .name b{color:var(--clay)}
.cmd .what{font-size:.86rem;color:var(--ink2);flex:1;min-width:160px}
.cmd .when{padding:0 17px 14px;font-size:.84rem;color:var(--ink2)}
.cmd .when b{color:var(--ink);font-weight:600}
.cmd .demo{margin:0 13px 13px;background:var(--code);border-radius:10px;padding:13px 15px;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--code-tx);display:none}
.cmd.open .demo{display:block}
.cmd .demo .ln{white-space:pre-wrap;word-break:break-word;margin:2px 0}
.cmd .demo .cm{color:#E9A87E}
.dim{color:var(--code-dim)}.ok{color:#6FD79B}.wn{color:#E7B86A}
.demobtn{margin-left:auto}

/* ===== roadmap / paths ===== */
.phase{border:1px solid var(--line);border-radius:var(--r2);margin-bottom:13px;background:var(--card);box-shadow:var(--shadow-sm);overflow:hidden}
.phase .ph{display:flex;align-items:center;gap:14px;padding:18px 19px;cursor:pointer}
.phase .pic{width:42px;height:42px;border-radius:12px;background:var(--clay-t);color:var(--clay);display:grid;place-items:center;flex-shrink:0}
.phase .pic svg{width:21px;height:21px}
.phase .pt{flex:1;min-width:0}
.phase .wk{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase}

text:`Vamos a construir un agente de IA para WhatsApp para [NEGOCIO]. Antes de codear, preguntame lo que necesites (qué hace el negocio, qué debe resolver el bot, si agenda turnos, si cobra, horario de atención, cuándo escalar a humano).

ARQUITECTURA propuesta (confirmá o ajustá antes de implementar):
- Canal: WhatsApp Business API (Meta Cloud API) vía webhook. Un proveedor oficial si hace falta (Twilio / 360dialog / Gupshup).
- Backend: Node/Next.js (o el stack que prefiera) con un endpoint webhook que recibe mensajes y responde.
- Cerebro: API de Claude (modelo claude-opus-4-8). System prompt con la personalidad y reglas del negocio + tool use para acciones (consultar stock, agendar, derivar a humano).
- Memoria: guardar la conversación por número de teléfono (Postgres/Supabase) para dar contexto.
- Handoff: cuando el cliente lo pide o el bot no puede, marca la conversación para un humano con TODO el contexto.

REGLAS NO NEGOCIABLES:
- Validar y verificar la firma del webhook de Meta. Nunca exponer tokens.
- Responder rápido al webhook (200) y procesar async.
- Cumplir políticas de WhatsApp: plantillas aprobadas para iniciar conversación, ventana de 24h, opt-out.
- Rate limiting y manejo de errores con reintentos.

Primero hacé un PLAN.md con el flujo de un mensaje de punta a punta y esperá mi OK. Después implementás por partes, con tests del webhook.`},
{cat:"WhatsApp",tag:"pine",title:"Personalidad y reglas del bot (system prompt)",desc:"El system prompt que define cómo habla y qué puede hacer tu agente de WhatsApp.",
text:`Generá el system prompt para un agente de WhatsApp de [NEGOCIO]. Tiene que incluir:

IDENTIDAD: nombre del asistente, tono (cercano pero profesional, español rioplatense), y que SIEMPRE aclare que es un asistente virtual si se lo preguntan.

QUÉ SABE: [productos/servicios, precios, horarios, ubicación, formas de pago]. Si no sabe algo, lo dice y ofrece derivar a una persona; nunca inventa.

QUÉ PUEDE HACER (tools): [responder consultas, pasar catálogo, agendar turno, tomar pedido, derivar a humano].

LÍMITES: no promete lo que no puede cumplir, no da información médica/legal/financiera sensible, no comparte datos de otros clientes, no negocia precios fuera de lo permitido.

ESTILO DE WHATSAPP: mensajes cortos, uno o dos por respuesta, sin párrafos enormes. Emojis con moderación. Siempre cierra con una pregunta o un próximo paso claro.

HANDOFF: cuando el cliente pida una persona o haya una queja/cancelación/caso complejo, deriva a un humano resumiendo el caso.

Devolvémelo listo para pegar como system prompt, y un set de 8 mensajes de prueba (cliente difícil incluido) para validarlo.`},

{cat:"Instagram",tag:"berry",title:"Agente de Instagram (DMs + comentarios)",desc:"Bot que responde DMs y comentarios de Instagram con la API de Mensajería de Meta.",
text:`Construyamos un agente de IA para Instagram para [MARCA]. Antes de codear, preguntame lo necesario (qué vende, qué consultas llegan más, si vende por DM, cuándo derivar a humano).

{cat:"Instagram",tag:"berry",title:"Calendario de contenido + captions",desc:"Para usar Claude como tu equipo de contenido de Instagram.",
text:`Actuá como mi estratega de contenido de Instagram para [MARCA / NICHO]. Tono de marca: [DESCRIBÍ].

{cat:"Kickoff",tag:"clay",title:"Kickoff seguro 0→1 (el prompt madre)",desc:"Arranca cualquier proyecto nuevo con la capa de seguridad puesta desde el commit 1.",
text:`Vas a arrancar un proyecto nuevo desde cero. Antes de escribir código, hacé estas 3 cosas en orden:

1. PREGUNTAME lo que necesites para entender el producto (público, features core del MVP, si hay pagos, si hay datos sensibles). No asumas nada importante.
2. PROPONÉ un plan de arquitectura en PLAN.md y esperá mi OK antes de implementar.
3. RECIÉN AHÍ implementá la base con este stack y estándares NO NEGOCIABLES:

STACK
- Next.js (App Router) + TypeScript estricto (strict:true, sin any)
- Supabase: Postgres + Auth + Storage · Tailwind · deploy a Vercel · repo GitHub con .gitignore correcto desde el primer commit

SEGURIDAD (implementar TODO, no "después")
- RLS habilitado en TODAS las tablas, con policies escritas y testeadas.
- Validación con Zod en todo input: forms, API routes y server actions.
- .env.local + .env.example documentado. NUNCA commitear secrets. service_role key solo server-side.
- Verificación de sesión en el SERVIDOR (middleware + checks por ruta).
- Headers de seguridad en next.config: CSP, HSTS, X-Frame-Options DENY, nosniff, Referrer-Policy.
- Rate limiting en endpoints sensibles. Sanitizar contenido de usuarios (XSS). npm audit limpio.

CALIDAD: ESLint + Prettier. README con la estructura. CLAUDE.md con las reglas. Commits chicos en español.

Al terminar: resumen de qué creaste, las policies de RLS, y un checklist de seguridad marcado.`},
{cat:"Kickoff",tag:"clay",title:"CLAUDE.md base (memoria permanente)",desc:"Las reglas que Claude respeta en TODAS las sesiones del proyecto. Pedile que lo guarde como CLAUDE.md.",
text:`Creá un archivo CLAUDE.md en la raíz del proyecto con este contenido (adaptá el stack al repo):

# Reglas del proyecto

## Protección de archivos — CRÍTICO
- NUNCA borres archivos sin pedirme confirmación explícita.
- NUNCA modifiques: .env*, migraciones aplicadas, configs de CI/CD, ni nada en /docs/decisiones.
- NUNCA uses comandos destructivos (rm -rf, git push --force, git reset --hard, DROP TABLE, TRUNCATE) sin mi confirmación en ese momento.
- Si un cambio afecta más de 5 archivos, mostrame el plan primero y esperá mi OK.
- Antes de algo riesgoso, sugerí crear una rama o commit de respaldo.

## Seguridad
- Todo input se valida con Zod. Toda tabla nueva nace con RLS habilitado.
- Jamás hardcodear secrets. Queries con datos de usuario siempre parametrizadas. Auth se verifica en el servidor.

## Estilo
- TypeScript estricto, prohibido "any". Componentes chicos. Justificá cada dependencia nueva.

## Flujo
- Commits chicos en español (feat/fix/refactor/chore). Siempre rama + PR. Al terminar: lint + typecheck + tests.

## Comunicación
- Si algo es ambiguo, preguntá antes de asumir. Si ves un problema de seguridad, avisá aunque no sea la tarea.`},
{cat:"Seguridad",tag:"rust",title:"Guardarraíles anti-destrucción",desc:"Para un proyecto en curso sin reglas. Frena borrados, cambios masivos y comandos peligrosos.",
text:`A partir de ahora operás bajo estas reglas. Confirmá que las entendiste y agregalas a CLAUDE.md (crealo si no existe):

1. ARCHIVOS INTOCABLES sin mi confirmación: .env y variantes, migraciones aplicadas, configs de deploy/CI, package-lock.json (salvo instalar algo), y cualquier archivo no relacionado con la tarea actual.
2. COMANDOS PROHIBIDOS sin confirmación caso por caso: rm -rf, git push --force, git reset --hard, git clean, DROP/TRUNCATE/DELETE sin WHERE, y todo lo que toque producción.
3. ALCANCE: trabajá SOLO en los archivos necesarios. Si hay que tocar algo más, decime qué y por qué.
4. ANTES de refactors o cambios en +5 archivos: plan corto → mi OK → ejecutás.
5. RED DE SEGURIDAD: antes de cambios grandes, commit de respaldo o rama nueva.
6. Si rompés algo: avisá qué se rompió y el camino de vuelta (no lo tapes con más cambios).`},
{cat:"Seguridad",tag:"rust",title:"Auditoría de seguridad (OWASP Top 10)",desc:"Revisión completa en modo solo-lectura, con hallazgos priorizados y fix con tu OK.",
text:`Hacé una auditoría de seguridad completa. Modo SOLO LECTURA primero: no cambies nada hasta que apruebe.

FASE 1 — RELEVAMIENTO: rutas/endpoints, auth y sesiones, queries a DB, uploads, variables de entorno, dependencias.
FASE 2 — AUDITORÍA (OWASP Top 10): inyección (SQL/comandos por concatenación), auth rota (¿sesión verificada en server en TODAS las rutas?), exposición de datos (campos de más, secrets en código/historial), RLS tabla por tabla, XSS, CSRF/CORS, npm audit, rate limiting, headers.
FASE 3 — REPORTE: SECURITY_AUDIT.md con cada hallazgo: [CRÍTICO/ALTO/MEDIO/BAJO] — qué — dónde (archivo:línea) — cómo se explota — cómo se arregla.
FASE 4 — Esperá mi OK y arreglá desde los críticos, un commit por hallazgo.`},
{cat:"QA",tag:"gold",title:"QA completo: plan + tests + CI",desc:"Plan de testing, tests unitarios y E2E, todo corriendo en CI.",
text:`Armá la capa de QA completa:

1. PLAN — TESTING.md: flujos críticos, casos borde, qué se testea en qué nivel.
2. UNIT + INTEGRACIÓN — Vitest. Priorizá validaciones, lógica de negocio, transformaciones, helpers de auth.
3. E2E — Playwright para 3-5 flujos clave (registro→login→acción→logout). Incluí caso "usuario malicioso": rutas protegidas sin sesión, payloads inválidos.
4. CI — GitHub Action: lint + typecheck + tests en cada PR. No se mergea si falla.
5. Tests legibles (nombre = comportamiento en español), datos aislados (nunca producción).
Al terminar: corré la suite y mostrame resultado + qué quedó sin cubrir.`},
{cat:"Contenido",tag:"gold",title:"Voz de marca reutilizable",desc:"Definí el tono una vez y guardalo como skill para todo texto público.",
text:`Vamos a definir la voz de marca de [NEGOCIO] para que todo texto público suene igual.
